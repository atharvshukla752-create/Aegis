<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AegisWeb</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --ink: #0b0f14;
    --panel: #12181f;
    --panel-2: #171f28;
    --border: #232e3a;
    --text: #e7ecf1;
    --text-dim: #7d8ba0;
    --amber: #e3a24d;
    --amber-dim: #6b5230;
    --danger: #d9705f;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    background: var(--ink);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display: flex;
    overflow: hidden;
  }

  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 18px 14px;
  }

  .brand { display: flex; align-items: center; gap: 10px; padding: 4px 6px 20px 6px; }
  .brand .mark { position: relative; width: 30px; height: 30px; flex-shrink: 0; }
  .brand .mark svg { width: 100%; height: 100%; }
  .brand .mark .sweep { transform-origin: 15px 15px; animation: sweep 3.5s linear infinite; }
  @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .brand .name { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; letter-spacing: 0.01em; }
  .brand .name .web {
    color: var(--amber); font-family: 'Inter', sans-serif; font-size: 11px;
    font-weight: 600; letter-spacing: 0.08em; vertical-align: super; margin-left: 3px;
  }

  .new-chat-btn {
    display: flex; align-items: center; gap: 8px;
    background: transparent; border: 1px solid var(--border); color: var(--text);
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    transition: border-color 0.15s, background 0.15s; margin-bottom: 18px;
  }
  .new-chat-btn:hover { border-color: var(--amber-dim); background: rgba(227, 162, 77, 0.06); }
  .new-chat-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  .history-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-dim); padding: 0 6px 8px 6px;
  }

  .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }

  .history-item {
    padding: 9px 10px; border-radius: 7px; font-size: 13px; color: var(--text-dim);
    cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: background 0.15s, color 0.15s;
  }
  .history-item:hover { background: var(--panel-2); color: var(--text); }
  .history-item.active {
    background: var(--panel-2); color: var(--text);
    border-left: 2px solid var(--amber); padding-left: 8px;
  }

  .sidebar-footer {
    padding-top: 12px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 6px;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 5px #4ade80; }
  .status-dot.offline { background: var(--danger); box-shadow: 0 0 5px var(--danger); }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-scroll { flex: 1; overflow-y: auto; padding: 32px 0; }
  .chat-inner { max-width: 720px; margin: 0 auto; padding: 0 24px; }

  .empty-state {
    height: 100%; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding-top: 15vh;
  }
  .empty-state .mark-lg { width: 56px; height: 56px; margin-bottom: 18px; }
  .empty-state .mark-lg .sweep { transform-origin: 28px 28px; animation: sweep 3.5s linear infinite; }
  .empty-state h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 24px; margin: 0 0 6px 0; }
  .empty-state p { color: var(--text-dim); font-size: 14px; margin: 0; max-width: 340px; }

  .msg { display: flex; gap: 12px; margin-bottom: 22px; animation: rise 0.2s ease; }
  @keyframes rise { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .msg .avatar {
    width: 26px; height: 26px; flex-shrink: 0; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; margin-top: 2px;
  }
  .msg.user .avatar { background: var(--panel-2); color: var(--text-dim); }
  .msg.aegis .avatar { background: rgba(227, 162, 77, 0.12); color: var(--amber); }

  .msg .bubble { font-size: 14.5px; line-height: 1.65; padding-top: 2px; white-space: pre-wrap; }
  .msg .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 4px; }

  .typing { display: inline-flex; gap: 3px; padding: 4px 0; }
  .typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); animation: blink 1.2s infinite ease-in-out; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.25; } 40% { opacity: 1; } }

  .composer-wrap { padding: 16px 24px 22px 24px; border-top: 1px solid var(--border); background: var(--ink); }
  .composer {
    max-width: 720px; margin: 0 auto; display: flex; align-items: flex-end; gap: 10px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 10px 10px 10px 16px; transition: border-color 0.15s;
  }
  .composer:focus-within { border-color: var(--amber-dim); }
  .composer textarea {
    flex: 1; background: transparent; border: none; outline: none; resize: none;
    color: var(--text); font-family: inherit; font-size: 14.5px; line-height: 1.5;
    max-height: 160px; padding: 6px 0;
  }
  .composer textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    background: var(--amber); border: none; color: #1a1206; width: 34px; height: 34px;
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: opacity 0.15s, transform 0.1s;
  }
  .send-btn:hover { opacity: 0.88; }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }

  .composer-hint { max-width: 720px; margin: 8px auto 0 auto; font-size: 11px; color: var(--text-dim); text-align: center; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="brand">
    <span class="mark">
      <svg viewBox="0 0 30 30" fill="none">
        <path d="M15 3 L26 8 V16 C26 22 21 26.5 15 28 C9 26.5 4 22 4 16 V8 Z" stroke="#e3a24d" stroke-width="1.6" fill="none" opacity="0.5"/>
        <g class="sweep">
          <line x1="15" y1="15" x2="15" y2="5" stroke="#e3a24d" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
        </g>
        <circle cx="15" cy="15" r="1.8" fill="#e3a24d"/>
      </svg>
    </span>
    <span class="name">Aegis<span class="web">WEB</span></span>
  </div>

  <button class="new-chat-btn" id="newChatBtn">
    <svg viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    New chat
  </button>

  <div class="history-label">Recent</div>
  <div class="history-list" id="historyList"></div>

  <div class="sidebar-footer">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusLabel">Checking connection…</span>
  </div>
</div>

<div class="main">
  <div class="chat-scroll" id="chatScroll">
    <div class="chat-inner" id="chatInner">
      <div class="empty-state" id="emptyState">
        <span class="mark-lg">
          <svg viewBox="0 0 56 56" fill="none">
            <path d="M28 5 L48 14 V29 C48 40 39 49 28 52 C17 49 8 40 8 29 V14 Z" stroke="#e3a24d" stroke-width="1.6" fill="none" opacity="0.45"/>
            <g class="sweep">
              <line x1="28" y1="28" x2="28" y2="10" stroke="#e3a24d" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
            </g>
            <circle cx="28" cy="28" r="3" fill="#e3a24d"/>
          </svg>
        </span>
        <h1>What are we working on?</h1>
        <p>Ask a question, request some code, or just talk. AegisWeb keeps the conversation going wherever you are.</p>
      </div>
    </div>
  </div>

  <div class="composer-wrap">
    <div class="composer">
      <textarea id="input" placeholder="Message AegisWeb…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg viewBox="0 0 16 16" fill="none"><path d="M2 8h11M8 2l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="composer-hint">AegisWeb can chat and write code, but can't modify its own files from here.</div>
  </div>
</div>

<script>
const API_BASE = "";
const AEGIS_KEY = "change-this-to-your-own-secret"; // must match web_server.py

let sessions = [];
let activeSessionId = null;

function createSession() {
  const session = { id: Date.now(), title: "New chat", messages: [] };
  sessions.unshift(session);
  activeSessionId = session.id;
  renderHistory();
  renderChat();
}

function activeSession() {
  return sessions.find(s => s.id === activeSessionId);
}

function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  sessions.forEach(s => {
    const item = document.createElement('div');
    item.className = 'history-item' + (s.id === activeSessionId ? ' active' : '');
    item.textContent = s.title;
    item.onclick = () => { activeSessionId = s.id; renderHistory(); renderChat(); };
    list.appendChild(item);
  });
}

function renderChat() {
  const inner = document.getElementById('chatInner');
  const session = activeSession();
  if (!session || session.messages.length === 0) {
    inner.innerHTML = document.getElementById('emptyState').outerHTML;
    return;
  }
  inner.innerHTML = '';
  session.messages.forEach(m => inner.appendChild(renderMessage(m.role, m.text)));
  document.getElementById('chatScroll').scrollTop = 999999;
}

function renderMessage(role, text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role === 'user' ? 'user' : 'aegis');
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'Y' : 'A';
  const body = document.createElement('div');
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? 'You' : 'AegisWeb';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  body.appendChild(label);
  body.appendChild(bubble);
  wrap.appendChild(avatar);
  wrap.appendChild(body);
  return wrap;
}

function showTyping() {
  const inner = document.getElementById('chatInner');
  const wrap = renderMessage('aegis', '');
  wrap.id = 'typingMsg';
  wrap.querySelector('.bubble').innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
  inner.appendChild(wrap);
  document.getElementById('chatScroll').scrollTop = 999999;
}

function removeTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  if (!activeSession()) createSession();
  const session = activeSession();
  if (session.messages.length === 0) {
    session.title = text.slice(0, 32) + (text.length > 32 ? '…' : '');
  }
  session.messages.push({ role: 'user', text });
  renderHistory();
  renderChat();
  input.value = '';
  autoGrow(input);
  document.getElementById('sendBtn').disabled = true;

  showTyping();

  try {
    const res = await fetch(API_BASE + '/api/send_message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-aegis-key': AEGIS_KEY },
      body: JSON.stringify({ user_input: text, voice_on: false, hindi_on: false }),
    });
    const data = await res.json();
    removeTyping();
    session.messages.push({ role: 'aegis', text: data.reply || '(no reply)' });
  } catch (err) {
    removeTyping();
    session.messages.push({ role: 'aegis', text: 'Could not reach the server. Check that web_server.py is running and the key matches.' });
  }
  renderChat();
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

document.getElementById('input').addEventListener('input', function () {
  autoGrow(this);
  document.getElementById('sendBtn').disabled = this.value.trim().length === 0;
});

document.getElementById('input').addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (this.value.trim()) sendMessage();
  }
});

document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('newChatBtn').addEventListener('click', createSession);

async function checkConnection() {
  const dot = document.getElementById('statusDot');
  const label = document.getElementById('statusLabel');
  try {
    const res = await fetch(API_BASE + '/api/stats', { headers: { 'x-aegis-key': AEGIS_KEY } });
    if (res.ok) {
      dot.classList.remove('offline');
      label.textContent = 'Connected';
    } else {
      throw new Error();
    }
  } catch {
    dot.classList.add('offline');
    label.textContent = 'Offline';
  }
}

checkConnection();
setInterval(checkConnection, 15000);
createSession();
</script>

</body>
</html>
